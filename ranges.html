<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranges NL10 — PokerStats</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0e0e1a;
  --bg3: #13131f;
  --border: rgba(255,255,255,0.07);
  --blue: #3b82f6;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --text: #e2e8f0;
  --muted: #64748b;
  --card: rgba(255,255,255,0.03);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── HEADER ── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px; border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,rgba(59,130,246,0.06),transparent);
  position:sticky; top:0; z-index:100; backdrop-filter:blur(10px);
}
.header-left { display:flex; align-items:center; gap:14px; }
.logo { font-size:1.1rem; font-weight:900; color:#fff; letter-spacing:-0.5px; }
.logo span { color:var(--blue); }
.back-btn {
  background:rgba(255,255,255,0.05); border:1px solid var(--border);
  color:var(--muted); padding:6px 12px; border-radius:6px; cursor:pointer;
  font-family:'Montserrat',sans-serif; font-size:0.75rem; font-weight:600;
  transition:all 0.2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px;
}
.back-btn:hover { color:#fff; border-color:#555; }
.limit-badge {
  background:linear-gradient(135deg,#a855f7,#7c3aed);
  padding:4px 10px; border-radius:4px; font-size:0.7rem; font-weight:800;
  letter-spacing:1px; box-shadow:0 0 12px rgba(168,85,247,0.4);
}
.quiz-toggle {
  background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.4);
  color:#f59e0b; padding:7px 16px; border-radius:7px; cursor:pointer;
  font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.8rem;
  transition:all 0.2s; display:flex; align-items:center; gap:8px;
}
.quiz-toggle.active { background:rgba(245,158,11,0.25); border-color:#f59e0b; box-shadow:0 0 12px rgba(245,158,11,0.3); }
.quiz-toggle:hover { background:rgba(245,158,11,0.2); }

/* ── LAYOUT ── */
.main { display:grid; grid-template-columns:220px 1fr; gap:0; height:calc(100vh - 57px); }

/* ── SIDEBAR ── */
.sidebar {
  border-right:1px solid var(--border); padding:20px 14px;
  overflow-y:auto; display:flex; flex-direction:column; gap:20px;
}
.sidebar-section { display:flex; flex-direction:column; gap:6px; }
.sidebar-label { font-size:0.62rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); font-weight:700; margin-bottom:4px; }

.pos-btn, .sit-btn {
  background:rgba(255,255,255,0.03); border:1px solid var(--border);
  color:#888; padding:8px 12px; border-radius:7px; cursor:pointer;
  font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.78rem;
  transition:all 0.18s; text-align:left; display:flex; align-items:center; gap:8px;
  width:100%;
}
.pos-btn:hover, .sit-btn:hover { background:rgba(255,255,255,0.06); color:#ccc; }
.pos-btn.active { background:rgba(59,130,246,0.15); border-color:rgba(59,130,246,0.5); color:#60a5fa; }
.sit-btn.active { background:rgba(34,197,94,0.12); border-color:rgba(34,197,94,0.4); color:#4ade80; }

.pos-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.legend { display:flex; flex-direction:column; gap:5px; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:0.7rem; color:#666; font-weight:600; }
.legend-color { width:14px; height:14px; border-radius:3px; flex-shrink:0; }

/* ── CONTENT ── */
.content { overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:20px; }

/* ── SITUATION HEADER ── */
.sit-header {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:16px 20px; display:flex; justify-content:space-between; align-items:flex-start;
}
.sit-title { font-size:1.1rem; font-weight:800; color:#fff; }
.sit-desc { font-size:0.78rem; color:var(--muted); margin-top:4px; line-height:1.5; max-width:500px; }
.sit-stats { display:flex; gap:16px; }
.sit-stat { text-align:center; }
.sit-stat-val { font-size:1.1rem; font-weight:800; color:var(--blue); }
.sit-stat-label { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }

/* ── GRID CONTAINER ── */
.grid-section { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.grid-panel {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:16px; display:flex; flex-direction:column; gap:10px;
}
.grid-panel-title {
  font-size:0.72rem; text-transform:uppercase; letter-spacing:1px;
  font-weight:700; padding-bottom:8px; border-bottom:1px solid var(--border);
}
.grid-panel-title.value { color:var(--green); }
.grid-panel-title.bluff { color:var(--red); }
.grid-panel-title.call  { color:var(--cyan); }
.grid-panel-title.fold  { color:var(--muted); }

/* ── 13x13 MATRIX ── */
.matrix-wrap { position:relative; }
.matrix {
  display:grid; grid-template-columns:repeat(13,1fr); gap:2px;
  font-family:'JetBrains Mono',monospace;
}
.matrix-row-label {
  display:grid; grid-template-columns:repeat(13,1fr); gap:2px;
  margin-bottom:2px;
}
.m-cell {
  aspect-ratio:1; border-radius:3px; display:flex; align-items:center;
  justify-content:center; font-size:0.52rem; font-weight:700;
  cursor:pointer; transition:all 0.15s; position:relative;
  border:1px solid transparent; user-select:none;
}
.m-cell:hover { transform:scale(1.15); z-index:10; }

/* Couleurs des mains */
.m-pair    { background:rgba(168,85,247,0.25); border-color:rgba(168,85,247,0.4); color:#c084fc; }
.m-value   { background:rgba(34,197,94,0.25);  border-color:rgba(34,197,94,0.4);  color:#4ade80; }
.m-bluff   { background:rgba(239,68,68,0.2);   border-color:rgba(239,68,68,0.35); color:#f87171; }
.m-call    { background:rgba(6,182,212,0.2);   border-color:rgba(6,182,212,0.35); color:#22d3ee; }
.m-dead    { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.05); color:#333; }
.m-mixed   { background:linear-gradient(135deg,rgba(34,197,94,0.2),rgba(6,182,212,0.2)); border-color:rgba(34,197,94,0.3); color:#86efac; }

/* Quiz mode */
.quiz-mode .m-cell:not(.m-dead) { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.1); color:#555; }
.quiz-mode .m-cell.quiz-correct { background:rgba(34,197,94,0.3); border-color:#22c55e; color:#4ade80; animation:flashGreen 0.3s; }
.quiz-mode .m-cell.quiz-wrong   { background:rgba(239,68,68,0.3);  border-color:#ef4444; color:#f87171; animation:flashRed 0.3s; }
.quiz-mode .m-cell.quiz-revealed { }
@keyframes flashGreen { 0%{transform:scale(1.3)} 100%{transform:scale(1)} }
@keyframes flashRed   { 0%{transform:scale(1.3)} 100%{transform:scale(1)} }

/* ── QUIZ BAR ── */
.quiz-bar {
  background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2);
  border-radius:10px; padding:14px 20px; display:none;
  align-items:center; justify-content:space-between; gap:16px;
}
.quiz-bar.visible { display:flex; }
.quiz-score-group { display:flex; gap:20px; align-items:center; }
.quiz-score-item { display:flex; flex-direction:column; align-items:center; }
.quiz-score-val { font-size:1.4rem; font-weight:900; }
.quiz-score-label { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.quiz-score-val.correct { color:var(--green); }
.quiz-score-val.wrong   { color:var(--red); }
.quiz-score-val.pct     { color:var(--yellow); }
.quiz-msg { font-size:0.85rem; font-weight:600; color:var(--yellow); }
.quiz-btn {
  background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.4);
  color:#f59e0b; padding:8px 16px; border-radius:7px; cursor:pointer;
  font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.78rem;
  transition:all 0.2s;
}
.quiz-btn:hover { background:rgba(245,158,11,0.3); }

/* ── TIPS ── */
.tips-panel {
  background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px;
}
.tips-title { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:700; margin-bottom:10px; }
.tips-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.tip-card {
  background:rgba(255,255,255,0.02); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px;
}
.tip-card-title { font-size:0.72rem; font-weight:700; margin-bottom:4px; }
.tip-card-body { font-size:0.7rem; color:#666; line-height:1.5; }
.tip-card.blue  { border-top:2px solid var(--blue);   } .tip-card.blue  .tip-card-title { color:var(--blue); }
.tip-card.green { border-top:2px solid var(--green);  } .tip-card.green .tip-card-title { color:var(--green); }
.tip-card.amber { border-top:2px solid var(--yellow); } .tip-card.amber .tip-card-title { color:var(--yellow); }
.tip-card.red   { border-top:2px solid var(--red);    } .tip-card.red   .tip-card-title { color:var(--red); }
.tip-card.purple{ border-top:2px solid var(--purple); } .tip-card.purple .tip-card-title { color:var(--purple); }
.tip-card.cyan  { border-top:2px solid var(--cyan);   } .tip-card.cyan  .tip-card-title { color:var(--cyan); }

/* ── TOOLTIP ── */
.tooltip {
  position:fixed; background:#1a1a2e; border:1px solid rgba(59,130,246,0.4);
  border-radius:8px; padding:8px 12px; font-size:0.75rem; color:#fff;
  pointer-events:none; z-index:999; display:none; max-width:200px;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#222; border-radius:4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="index.html" class="back-btn">← Dashboard</a>
    <span class="logo">POKER<span>STATS</span></span>
    <span class="limit-badge">NL10</span>
  </div>
  <div style="font-size:0.9rem;font-weight:800;color:#fff;">📚 Mes Ranges</div>

</div>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">

      <div class="sidebar-label">Position</div>

      <button class="pos-btn" onclick="setPos('BTN')" id="pos-BTN"><span class="pos-dot" style="background:#3b82f6"></span>Bouton (BTN)</button>
      <button class="pos-btn" onclick="setPos('SB')"  id="pos-SB" ><span class="pos-dot" style="background:#a855f7"></span>Small Blind (SB)</button>
      <button class="pos-btn" onclick="setPos('BB')"  id="pos-BB" ><span class="pos-dot" style="background:#06b6d4"></span>Big Blind (BB)</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Situation</div>
      <button class="sit-btn active" onclick="setSit('RFI')"     id="sit-RFI">🟢 Open Raise (RFI)</button>

    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Légende</div>

        <div class="legend-item"><div class="legend-color" style="background:rgba(34,197,94,0.4)"></div>Value / Open</div>

        <div class="legend-item"><div class="legend-color" style="background:rgba(6,182,212,0.35)"></div>Call / Défense</div>
        <div class="legend-item"><div class="legend-color" style="background:rgba(168,85,247,0.4)"></div>Paires (toujours)</div>
        <div class="legend-item"><div class="legend-color" style="background:linear-gradient(135deg,rgba(34,197,94,0.3),rgba(6,182,212,0.3))"></div>Mixte (freq.)</div>
        <div class="legend-item"><div class="legend-color" style="background:rgba(255,255,255,0.05)"></div>Fold / Hors range</div>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <!-- Dynamiquement rempli par JS -->
  </div>
</div>

<!-- Quiz bar -->
<div class="quiz-bar" id="quiz-bar">
  <div class="quiz-score-group">
    <div class="quiz-score-item"><div class="quiz-score-val correct" id="q-correct">0</div><div class="quiz-score-label">Corrects</div></div>
    <div class="quiz-score-item"><div class="quiz-score-val wrong"   id="q-wrong">0</div><div class="quiz-score-label">Erreurs</div></div>
    <div class="quiz-score-item"><div class="quiz-score-val pct"     id="q-pct">—</div><div class="quiz-score-label">Score</div></div>
  </div>
  <div class="quiz-msg" id="quiz-msg">Clique sur chaque main pour indiquer si tu la joues ou pas</div>
  <button class="quiz-btn" onclick="resetQuiz()">🔄 Recommencer</button>
</div>

<div class="tooltip" id="tooltip"></div>

// ── UTILS ──────────────────────────────────────────────
function buildGrid({ pairs, suited, offsuit }) {
  const grid = {};
  // Toutes les combinaisons
  for (let r = 0; r < 13; r++) {
    for (let c = 0; c < 13; c++) {
      const key = cellKey(r, c);
      grid[key] = 'dead';
    }
  }
  // Paires (diagonale)
  pairs.forEach(h => {
    const r = RANKS.indexOf(h[0]);
    if (r >= 0) grid[`${r}-${r}`] = 'pair';
  });
  // Suited (haut-gauche, r < c)
  suited.forEach(h => {
    const r1 = RANKS.indexOf(h[0]);
    const r2 = RANKS.indexOf(h[1]);
    if (r1 >= 0 && r2 >= 0) {
      const min = Math.min(r1,r2), max = Math.max(r1,r2);
      grid[`${min}-${max}`] = 'value';
    }
  });
  // Offsuit (bas-droite, r > c)
  offsuit.forEach(h => {
    const r1 = RANKS.indexOf(h[0]);
    const r2 = RANKS.indexOf(h[1]);
    if (r1 >= 0 && r2 >= 0) {
      const min = Math.min(r1,r2), max = Math.max(r1,r2);
      grid[`${max}-${min}`] = 'bluff';
    }
  });
  return grid;
}

function cellKey(r, c) { return `${r}-${c}`; }

function cellLabel(r, c) {
  if (r === c) return RANKS[r]+RANKS[c];
  if (r < c)  return RANKS[r]+RANKS[c]+'s';
  return RANKS[c]+RANKS[r]+'o';
}

function renderMatrix(grid) {
  let html = '';
  for (let r = 0; r < 13; r++) {
    for (let c = 0; c < 13; c++) {
      const key = cellKey(r, c);
      const action = grid[key] || 'dead';
      const label = cellLabel(r, c);
      const qa = quizAnswers[key];
      let extra = '';
      if (quizMode && qa) extra = ` quiz-${qa}`;
      html += `<div class="m-cell m-${action}${extra}" data-key="${key}" data-action="${action}" data-label="${label}">${label}</div>`;
    }
  }
  return html;
}

// ── TOOLTIP ──────────────────────────────────────────────
function showTooltip(e) {
  const cell = e.currentTarget;
  const action = cell.dataset.action;
  const label = cell.dataset.label;
  const labels = { value:'✅ Open / Value', bluff:'🔴 Bluff / Semi-bluff', call:'📞 Call / Défense', pair:'♠ Paire — Toujours jouée', mixed:'🟡 Mixte (fréquence)', dead:'❌ Fold — Hors range' };
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `<strong>${label}</strong><br><span style="color:#888">${labels[action]||action}</span>`;
  tt.style.display = 'block';
  moveTip(e);
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }
function moveTip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (e.clientX + 12) + 'px';
  tt.style.top  = (e.clientY - 30) + 'px';
}
document.addEventListener('mousemove', e => {
  const tt = document.getElementById('tooltip');
  if (tt.style.display === 'block') moveTip(e);
});

// ── QUIZ ──────────────────────────────────────────────
function toggleQuiz() {
  quizMode = !quizMode;
  quizAnswers = {}; quizCorrect = 0; quizWrong = 0;
  const btn = document.getElementById('quiz-btn');
  const bar = document.getElementById('quiz-bar');
  btn.classList.toggle('active', quizMode);
  btn.textContent = quizMode ? '✅ Quitter Quiz' : '🎯 Mode Quiz';
  bar.classList.toggle('visible', quizMode);
  updateQuizScore();
  render();
}

function quizClick(e) {
  const cell = e.currentTarget;
  const key = cell.dataset.key;
  const action = cell.dataset.action;
  if (quizAnswers[key]) return; // déjà répondu

  const isPlayable = action !== 'dead';
  // On toggle : clic = "je joue cette main"
  const correct = isPlayable;
  quizAnswers[key] = correct ? 'correct' : 'wrong';
  if (correct) quizCorrect++; else quizWrong++;

  cell.classList.add(`quiz-${quizAnswers[key]}`);
  // Révéler la vraie couleur après 600ms
  setTimeout(() => {
    cell.classList.remove('quiz-correct','quiz-wrong');
    cell.classList.add('m-' + action, 'quiz-revealed');
  }, 600);

  updateQuizScore();
}

function updateQuizScore() {
  const total = quizCorrect + quizWrong;
  document.getElementById('q-correct').textContent = quizCorrect;
  document.getElementById('q-wrong').textContent = quizWrong;
  document.getElementById('q-pct').textContent = total > 0 ? Math.round((quizCorrect/total)*100) + '%' : '—';
  const msgs = ['Clique sur chaque main pour indiquer si tu la joues ou pas', 'Continue !', 'Bon travail !', 'Excellent !'];
  const pct = total > 0 ? quizCorrect/total : 0;
  document.getElementById('quiz-msg').textContent = total === 0 ? msgs[0] : pct > 0.8 ? msgs[3] : pct > 0.6 ? msgs[2] : msgs[1];
}

function resetQuiz() {
  quizAnswers = {}; quizCorrect = 0; quizWrong = 0;
  updateQuizScore(); render();
}

// ── NAVIGATION ──────────────────────────────────────────────
function setPos(pos) {
  curPos = pos;
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pos-'+pos).classList.add('active');
  if (quizMode) { quizAnswers={}; quizCorrect=0; quizWrong=0; updateQuizScore(); }
  render();
}
function setSit(sit) {
  curSit = sit;
  document.querySelectorAll('.sit-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sit-'+sit).classList.add('active');
  if (quizMode) { quizAnswers={}; quizCorrect=0; quizWrong=0; updateQuizScore(); }
  render();
}

// Init
render();
</script>
