<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Tracker NL10</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
    
    <script>
        // Force le navigateur à toujours télécharger le tout dernier CSS
        document.write('<link rel="stylesheet" href="style.css?t=' + new Date().getTime() + '">');
    </script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <header>
           <div class="header-top">
    <div class="logo-group">
        <h1 class="logo-text" style="margin: 0;">POKER<span>STATS</span></h1>
        <span class="badge">NL10</span>
    </div>
    
    <div class="action-group">
        <button class="btn-login" onclick="login()">Login Admin</button>
        <select id="global-filter" class="filter-dropdown" onchange="updateUI()">
            <option value="NL10">Challenge NL10</option>
            <option value="NL2">Historique NL2</option>
            <option value="ALL">Vue Globale</option>
        </select>
    </div>
</div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <small>💰 Bankroll Total</small>
                    <div class="value" id="total-br">500.00€</div>
                </div>
                <div class="stat-card">
                    <small>📈 Volume</small>
                    <div class="value" id="total-volume">0</div>
                </div>
                <div class="stat-card">
                    <small>🎯 Winrate</small>
                    <div class="value" id="winrate">0 bb/100</div>
                </div>
                <div class="stat-card">
                    <small>🏆 Taux de Réussite</small>
                    <div class="value" id="success-rate">0%</div>
                </div>
            </div>

            <div class="records-grid">
                <div class="record-card best-record">
                    <div class="record-icon">🔥</div>
                    <div class="record-info">
                        <small>Plus Gros Braquage</small>
                        <div class="record-value" id="best-session-gain">0.00€</div>
                        <div class="record-date" id="best-session-date">--/--</div>
                    </div>
                </div>
                <div class="record-card worst-record">
                    <div class="record-icon">🥶</div>
                    <div class="record-info">
                        <small>Pire Bad Beat</small>
                        <div class="record-value" id="worst-session-gain">0.00€</div>
                        <div class="record-date" id="worst-session-date">--/--</div>
                    </div>
                </div>
            </div>

            <div class="xp-bar-wrapper">
                <div class="xp-bar-header">
    <span class="xp-title" id="xp-title-text">🎯 Objectif 1000€</span>
    <span id="br-progression-text" class="xp-percentage">0%</span>
</div>
                <div class="xp-track">
                    <div class="xp-fill" id="progress-bar-fill"></div>
                </div>
            </div>
        </header>

        <main>
            <div class="chart-container" style="position: relative;">
                <button onclick="if(window.pokerChart) window.pokerChart.resetZoom()" title="Recadrer le graphique" style="position: absolute; top: 10px; right: 10px; background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.2); color: #60a5fa; width: 28px; height: 28px; padding: 0; border-radius: 6px; cursor: pointer; z-index: 10; transition: all 0.2s; display: flex; align-items: center; justify-content: center;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                    </svg>
                </button>
                <canvas id="myChart"></canvas>
            </div>
        </main>

        <section class="entry-form">
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="input-date">
            </div>
            <div class="input-group">
                <label>Heure</label>
                <input type="time" id="input-time">
            </div>
            <div class="input-group">
                <label>Mains</label>
                <input type="number" id="input-hands"> 
            </div>
            <div class="input-group">
                <label>Gain (€)</label>
                <input type="number" step="0.01" id="input-gain"> 
            </div>
            <div class="input-group">
                <label>Limite</label>
                <select id="input-stake" style="height: 45px; background: rgba(10, 10, 10, 0.5); border: 1px solid #444; color: white; border-radius: 8px; padding: 0 10px; font-weight: 700; font-family: 'Montserrat'; outline: none; cursor: pointer;">
                    <option value="NL10">NL10 (0.10€)</option>
                    <option value="NL2">NL2 (0.02€)</option>
                </select>
            </div>
            <button class="btn-add" onclick="addSession()">Ajouter</button>
        </section>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">Historique des sessions</h3>
                <button onclick="toggleHistoryFlip()" title="Voir le calendrier PNL" style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.4); color: #60a5fa; border-radius: 6px; padding: 6px 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat'; font-size: 0.75rem; font-weight: 600; transition: all 0.2s;">
                    PNL Card
                </button>
            </div>

            <div class="flip-container">
                <div class="flip-inner" id="history-flipper">
                    
                    <div class="flip-front">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Mains</th>
                                        <th>Gain (€)</th>
                                        <th>Gain (BB)</th> 
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="history-list"></tbody>
                            </table>
                        </div>
                        <button class="btn-reset" onclick="resetData()">Réinitialiser le challenge</button>
                    </div>

                    <div class="flip-back">
                        <div id="calendar-view"></div>
                    </div>

                </div>
            </div>
        </section>
        <div class="share-actions">
            <button class="btn-secondary" onclick="exportData()">
                <span class="icon">📤</span> Exporter
            </button>
            <button class="btn-secondary" onclick="importData()">
                <span class="icon">📥</span> Importer
            </button>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script2.js?v=victoire"></script>
</body>
</html>
